services:
  app:
    build: .
    container_name: text-enrichment-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PORT=8080
    volumes:
      - app-uploads:/app/back/uploads
      - app-data:/app/back/data
      - app-exports:/app/back/exports
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: text-enrichment-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - webnet

volumes:
  app-uploads:
  app-data:
  app-exports:

networks:
  webnet:
